<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Warui – Scoreboard Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep: #1a0d2e;
    --purple-mid: #3d1c6e;
    --purple-bright: #7b2fff;
    --magenta: #e91e8c;
    --cyan: #00e5ff;
    --gold: #f5a623;
    --gold-light: #ffd166;
    --black: #07020f;
    --white: #f0eaff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Exo 2', sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── DEMO BACKGROUND (remover en OBS, usar chroma key o fondo transparente) ── */
  .demo-bg {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #0d0820 0%, #1a0535 50%, #090514 100%);
    z-index: -1;
  }

  /* ══════════════════════════════════════
     OVERLAY CONTAINER  1920×200 aprox
  ══════════════════════════════════════ */
  .overlay {
    width: 960px;
    position: relative;
    user-select: none;
  }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    align-items: stretch;
    height: 90px;
    position: relative;
    filter: drop-shadow(0 0 18px rgba(0,229,255,0.25));
  }

  /* Player panels */
  .player {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, var(--black) 0%, var(--purple-deep) 60%, #2a0d50 100%);
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 100%, 0 100%);
  }

  .player.right {
    flex-direction: row-reverse;
    clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%);
    background: linear-gradient(225deg, var(--black) 0%, var(--purple-deep) 60%, #2a0d50 100%);
  }

  /* Animated scan line */
  .player::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    animation: scan 3s linear infinite;
  }
  .player.right::before { animation-delay: 1.5s; }
  @keyframes scan { to { left: 200%; } }

  /* Corner accent lines */
  .player::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(to bottom, var(--magenta), var(--purple-bright));
    box-shadow: 0 0 12px var(--magenta);
  }
  .player.right::after { left: auto; right: 0; background: linear-gradient(to bottom, var(--cyan), var(--purple-bright)); box-shadow: 0 0 12px var(--cyan); }

  .player-tag {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 22px;
    color: var(--white);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(233,30,140,0.6), 0 0 40px rgba(123,47,255,0.4);
  }
  .player.right .player-tag { text-align: right; }

  .player-sponsor {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .player-info { display: flex; flex-direction: column; gap: 2px; }
  .player.right .player-info { align-items: flex-end; }

  /* ── CENTER BLOCK ── */
  .center {
    width: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #0d0820 0%, var(--purple-deep) 100%);
    border-left: 2px solid var(--purple-bright);
    border-right: 2px solid var(--purple-bright);
    box-shadow: inset 0 0 30px rgba(123,47,255,0.3);
    position: relative;
    overflow: hidden;
  }

  .center::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(123,47,255,0.04) 8px, rgba(123,47,255,0.04) 9px),
      repeating-linear-gradient(90deg, transparent, transparent 8px, rgba(123,47,255,0.04) 8px, rgba(123,47,255,0.04) 9px);
  }

  .scores {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .score {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 46px;
    color: var(--white);
    line-height: 1;
    text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,229,255,0.4);
    width: 52px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .score:hover { color: var(--cyan); transform: scale(1.1); }

  .score-divider {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    color: var(--purple-bright);
    opacity: 0.7;
  }

  .vs-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.9;
    position: relative;
    z-index: 1;
  }

  /* ── BOTTOM INFO STRIP ── */
  .info-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 32px;
    margin-top: 3px;
    background: linear-gradient(90deg, rgba(233,30,140,0.15) 0%, rgba(13,8,32,0.95) 30%, rgba(13,8,32,0.95) 70%, rgba(0,229,255,0.12) 100%);
    border: 1px solid rgba(123,47,255,0.4);
    border-top: 2px solid var(--purple-bright);
    padding: 0 20px;
    position: relative;
    overflow: hidden;
  }

  .info-strip::before {
    content: '';
    position: absolute;
    top: 50%; left: -100%;
    width: 40%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245,166,35,0.5), transparent);
    animation: scan 4s linear infinite 2s;
  }

  .strip-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .strip-bestof { color: var(--gold); }
  .strip-event  { color: var(--white); opacity: 0.9; }
  .strip-round  { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

  /* Hex decorations */
  .hex-deco {
    position: absolute;
    right: 160px;
    top: 50%;
    transform: translateY(-50%);
    display: flex; gap: 5px;
  }
  .hex {
    width: 8px; height: 8px;
    background: var(--purple-bright);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    opacity: 0.6;
  }
  .hex:nth-child(2) { background: var(--magenta); opacity: 0.8; }
  .hex:nth-child(3) { background: var(--cyan); }

  /* ── WARUI LOGO CENTER BADGE ── */
  .logo-badge {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--magenta), var(--purple-bright));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 16px var(--magenta), 0 0 32px rgba(233,30,140,0.4);
    z-index: 10;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 14px;
    color: white;
  }

  /* ── CONTROLS (solo para demo, ocultar en stream) ── */
  .controls {
    margin-top: 50px;
    padding: 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(123,47,255,0.3);
    border-radius: 12px;
  }
  .controls h3 {
    font-family: 'Orbitron', monospace;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .ctrl-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .ctrl-label { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: var(--white); opacity: 0.7; letter-spacing: 1px; min-width: 120px; }

  input[type="text"] {
    background: rgba(123,47,255,0.15);
    border: 1px solid rgba(123,47,255,0.5);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,0.3); }

  select {
    background: rgba(123,47,255,0.15);
    border: 1px solid rgba(123,47,255,0.5);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }
  select option { background: #1a0d2e; }

  .btn {
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-score {
    background: linear-gradient(135deg, var(--purple-bright), var(--magenta));
    color: white;
    padding: 6px 12px;
    font-size: 16px;
  }
  .btn-score:hover { transform: scale(1.08); box-shadow: 0 0 14px var(--magenta); }
  .btn-reset { background: rgba(233,30,140,0.2); color: var(--magenta); border: 1px solid var(--magenta); }
  .btn-reset:hover { background: var(--magenta); color: white; }

  .score-ctrl { display: flex; align-items: center; gap: 8px; }
  .score-val {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    color: var(--white);
    min-width: 28px;
    text-align: center;
  }

  .divider { border: none; border-top: 1px solid rgba(123,47,255,0.2); margin: 12px 0; }

  /* ── GLOW PULSE ANIM ── */
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(233,30,140,0.3); }
    50% { box-shadow: 0 0 40px rgba(233,30,140,0.7), 0 0 60px rgba(123,47,255,0.4); }
  }
  .top-bar { animation: glow-pulse 4s ease-in-out infinite; }
</style>
</head>
<body>

<div class="demo-bg"></div>

<div class="overlay">

  <!-- ══ TOP BAR ══ -->
  <div class="top-bar">

    <!-- Player 1 -->
    <div class="player" id="panel-p1">
      <div class="player-info">
        <div class="player-tag" id="display-p1">JUGADOR 1</div>
        <div class="player-sponsor" id="display-sp1">ARENA WARUI</div>
      </div>
    </div>

    <!-- Center -->
    <div class="center">
      <div class="scores">
        <span class="score" id="s1" onclick="adjustScore(1,1)">0</span>
        <span class="score-divider">–</span>
        <span class="score" id="s2" onclick="adjustScore(2,1)">0</span>
      </div>
      <div class="vs-sub">VS</div>
      <div class="logo-badge">W</div>
    </div>

    <!-- Player 2 -->
    <div class="player right" id="panel-p2">
      <div class="player-info">
        <div class="player-tag" id="display-p2">JUGADOR 2</div>
        <div class="player-sponsor" id="display-sp2">ARENA WARUI</div>
      </div>
    </div>

  </div>

  <!-- ══ INFO STRIP ══ -->
  <div class="info-strip">
    <span class="strip-text strip-bestof" id="display-bestof">BEST OF 3</span>
    <div class="hex-deco">
      <div class="hex"></div><div class="hex"></div><div class="hex"></div>
    </div>
    <span class="strip-text strip-event">⚔ ARENA WARUI</span>
    <span class="strip-text strip-round" id="display-round">WINNERS QUARTERS</span>
  </div>

  <!-- ══ CONTROLS (demo) ══ -->
  <div class="controls">
    <h3>⚙ Panel de Control</h3>

    <div class="ctrl-row">
      <span class="ctrl-label">Jugador 1</span>
      <input type="text" id="in-p1" placeholder="Nombre tag" oninput="update()">
      <input type="text" id="in-sp1" placeholder="Sponsor/Team" oninput="update()">
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Jugador 2</span>
      <input type="text" id="in-p2" placeholder="Nombre tag" oninput="update()">
      <input type="text" id="in-sp2" placeholder="Sponsor/Team" oninput="update()">
    </div>

    <hr class="divider">

    <div class="ctrl-row">
      <span class="ctrl-label">Score</span>
      <div class="score-ctrl">
        <button class="btn btn-score" onclick="adjustScore(1,-1)">−</button>
        <span class="score-val" id="ctrl-s1">0</span>
        <button class="btn btn-score" onclick="adjustScore(1,1)">+</button>
      </div>
      <span style="color:var(--white);opacity:0.4;font-size:18px">vs</span>
      <div class="score-ctrl">
        <button class="btn btn-score" onclick="adjustScore(2,-1)">−</button>
        <span class="score-val" id="ctrl-s2">0</span>
        <button class="btn btn-score" onclick="adjustScore(2,1)">+</button>
      </div>
      <button class="btn btn-reset" onclick="resetScores()">Reset</button>
    </div>

    <div class="ctrl-row">
      <span class="ctrl-label">Formato</span>
      <select id="in-bestof" onchange="update()">
        <option>BEST OF 3</option>
        <option>BEST OF 5</option>
        <option>BEST OF 1</option>
      </select>
      <select id="in-round" onchange="update()">
        <option>WINNERS QUARTERS</option>
        <option>WINNERS SEMIS</option>
        <option>WINNERS FINALS</option>
        <option>LOSERS ROUND 1</option>
        <option>LOSERS QUARTERS</option>
        <option>LOSERS SEMIS</option>
        <option>LOSERS FINALS</option>
        <option>GRAND FINALS</option>
        <option>POOLS</option>
        <option>TOP 8</option>
      </select>
    </div>
  </div>

</div>

<script>
  let sc = [0, 0];

  function update() {
    const p1 = document.getElementById('in-p1').value || 'JUGADOR 1';
    const p2 = document.getElementById('in-p2').value || 'JUGADOR 2';
    const sp1 = document.getElementById('in-sp1').value || 'ARENA WARUI';
    const sp2 = document.getElementById('in-sp2').value || 'ARENA WARUI';
    document.getElementById('display-p1').textContent = p1.toUpperCase();
    document.getElementById('display-p2').textContent = p2.toUpperCase();
    document.getElementById('display-sp1').textContent = sp1.toUpperCase();
    document.getElementById('display-sp2').textContent = sp2.toUpperCase();
    document.getElementById('display-bestof').textContent = document.getElementById('in-bestof').value;
    document.getElementById('display-round').textContent = document.getElementById('in-round').value;
  }

  function adjustScore(player, delta) {
    const i = player - 1;
    sc[i] = Math.max(0, sc[i] + delta);
    document.getElementById('s' + player).textContent = sc[i];
    document.getElementById('ctrl-s' + player).textContent = sc[i];
    // Flash effect
    const el = document.getElementById('s' + player);
    el.style.transition = 'none';
    el.style.color = delta > 0 ? 'var(--gold)' : 'var(--magenta)';
    setTimeout(() => { el.style.transition = 'color 0.6s'; el.style.color = ''; }, 300);
  }

  function resetScores() {
    sc = [0, 0];
    ['1','2'].forEach(i => {
      document.getElementById('s' + i).textContent = 0;
      document.getElementById('ctrl-s' + i).textContent = 0;
    });
  }
</script>
</body>
</html>
