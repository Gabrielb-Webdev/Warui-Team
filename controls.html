<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Warui – Panel de Control</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple-deep: #1a0d2e;
    --purple-bright: #7b2fff;
    --magenta: #e91e8c;
    --cyan: #00e5ff;
    --gold: #f5a623;
    --black: #07020f;
    --white: #f0eaff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #0d0820 0%, #1a0535 50%, #090514 100%);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
  }

  .controls {
    width: 620px;
    padding: 28px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(123,47,255,0.3);
    border-radius: 12px;
  }

  .controls h2 {
    font-family: 'Orbitron', monospace;
    color: var(--gold);
    font-size: 16px;
    letter-spacing: 3px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: var(--white);
    opacity: 0.4;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }

  .ctrl-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .ctrl-label { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: var(--white); opacity: 0.7; letter-spacing: 1px; min-width: 120px; }

  input[type="text"] {
    background: rgba(123,47,255,0.15);
    border: 1px solid rgba(123,47,255,0.5);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,0.3); }

  select {
    background: rgba(123,47,255,0.15);
    border: 1px solid rgba(123,47,255,0.5);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }
  select option { background: #1a0d2e; color: var(--white); }
  select optgroup { background: #0d0820; color: var(--purple-bright); font-style: normal; font-size: 11px; }

  .btn {
    padding: 6px 16px;
    border: none;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-score {
    background: linear-gradient(135deg, var(--purple-bright), var(--magenta));
    color: white;
    padding: 6px 12px;
    font-size: 16px;
  }
  .btn-score:hover { transform: scale(1.08); box-shadow: 0 0 14px var(--magenta); }
  .btn-reset { background: rgba(233,30,140,0.2); color: var(--magenta); border: 1px solid var(--magenta); }
  .btn-reset:hover { background: var(--magenta); color: white; }

  .score-ctrl { display: flex; align-items: center; gap: 8px; }
  .score-val {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    color: var(--white);
    min-width: 28px;
    text-align: center;
  }

  .divider { border: none; border-top: 1px solid rgba(123,47,255,0.2); margin: 12px 0; }

  .status {
    margin-top: 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: var(--cyan);
    opacity: 0.6;
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="controls">
  <h2>⚙ Panel de Control</h2>
  <p class="subtitle">Abrí overlay.html en OBS como Browser Source · los cambios se sincronizan vía localStorage</p>

  <div class="ctrl-row">
    <span class="ctrl-label">Jugador 1</span>
    <input type="text" id="in-p1" placeholder="Nombre tag" oninput="update()">
    <input type="text" id="in-sp1" placeholder="Sponsor/Team" oninput="update()">
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Jugador 2</span>
    <input type="text" id="in-p2" placeholder="Nombre tag" oninput="update()">
    <input type="text" id="in-sp2" placeholder="Sponsor/Team" oninput="update()">
  </div>

  <hr class="divider">

  <div class="ctrl-row">
    <span class="ctrl-label">Score</span>
    <div class="score-ctrl">
      <button class="btn btn-score" onclick="adjustScore(1,-1)">−</button>
      <span class="score-val" id="ctrl-s1">0</span>
      <button class="btn btn-score" onclick="adjustScore(1,1)">+</button>
    </div>
    <span style="color:var(--white);opacity:0.4;font-size:18px">vs</span>
    <div class="score-ctrl">
      <button class="btn btn-score" onclick="adjustScore(2,-1)">−</button>
      <span class="score-val" id="ctrl-s2">0</span>
      <button class="btn btn-score" onclick="adjustScore(2,1)">+</button>
    </div>
    <button class="btn btn-reset" onclick="resetScores()">Reset</button>
  </div>

  <div class="ctrl-row">
    <span class="ctrl-label">Formato</span>
    <select id="in-bestof" onchange="update()">
      <option>BEST OF 3</option>
      <option>BEST OF 5</option>
      <option>BEST OF 1</option>
    </select>
    <select id="in-round" onchange="update()">
      <optgroup label="── WINNERS ──">
        <option>WINNERS ROUND 1</option>
        <option>WINNERS ROUND 2</option>
        <option>WINNERS ROUND 3</option>
        <option>WINNERS ROUND 4</option>
        <option>WINNERS QUARTERS</option>
        <option>WINNERS SEMIS</option>
        <option>WINNERS FINALS</option>
      </optgroup>
      <optgroup label="── LOSERS ──">
        <option>LOSERS ROUND 1</option>
        <option>LOSERS ROUND 2</option>
        <option>LOSERS ROUND 3</option>
        <option>LOSERS ROUND 4</option>
        <option>LOSERS ROUND 5</option>
        <option>LOSERS ROUND 6</option>
        <option>LOSERS ROUND 7</option>
        <option>LOSERS ROUND 8</option>
        <option>LOSERS QUARTERS</option>
        <option>LOSERS SEMIS</option>
        <option>LOSERS FINALS</option>
      </optgroup>
      <optgroup label="── FINAL ──">
        <option>GRAND FINALS</option>
        <option>GRAND FINALS RESET</option>
      </optgroup>
      <optgroup label="── OTROS ──">
        <option>POOLS</option>
        <option>TOP 8</option>
        <option>TOP 16</option>
        <option>TOP 32</option>
      </optgroup>
    </select>
  </div>

  <p class="status" id="status-msg">Listo</p>
</div>

<script>
  let state = {
    p1: '', p2: '',
    sp1: '', sp2: '',
    score1: 0, score2: 0,
    bestof: 'BEST OF 3',
    round: 'WINNERS QUARTERS'
  };

  function saveState() {
    localStorage.setItem('warui_scoreboard', JSON.stringify(state));
    const msg = document.getElementById('status-msg');
    msg.textContent = '✓ Sincronizado';
    msg.style.opacity = '1';
    setTimeout(() => { msg.textContent = 'Listo'; msg.style.opacity = '0.6'; }, 1500);
  }

  function update() {
    state.p1   = document.getElementById('in-p1').value.trim();
    state.p2   = document.getElementById('in-p2').value.trim();
    state.sp1  = document.getElementById('in-sp1').value.trim();
    state.sp2  = document.getElementById('in-sp2').value.trim();
    state.bestof = document.getElementById('in-bestof').value;
    state.round  = document.getElementById('in-round').value;
    saveState();
  }

  function adjustScore(player, delta) {
    const key = 'score' + player;
    state[key] = Math.max(0, state[key] + delta);
    document.getElementById('ctrl-s' + player).textContent = state[key];
    saveState();
  }

  function resetScores() {
    state.score1 = 0;
    state.score2 = 0;
    document.getElementById('ctrl-s1').textContent = 0;
    document.getElementById('ctrl-s2').textContent = 0;
    saveState();
  }

  // Restaurar estado guardado al cargar
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('warui_scoreboard');
    if (!saved) return;
    const s = JSON.parse(saved);
    state = s;
    document.getElementById('in-p1').value  = s.p1;
    document.getElementById('in-p2').value  = s.p2;
    document.getElementById('in-sp1').value = s.sp1;
    document.getElementById('in-sp2').value = s.sp2;
    document.getElementById('ctrl-s1').textContent = s.score1;
    document.getElementById('ctrl-s2').textContent = s.score2;
    document.getElementById('in-bestof').value = s.bestof;
    document.getElementById('in-round').value  = s.round;
  });
</script>
</body>
</html>
